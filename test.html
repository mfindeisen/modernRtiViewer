<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed Test - Modern RTI Viewer</title>
  <!-- 1. Include the compiled styles -->
  <link rel="stylesheet" href="./dist/modernrtiviewer.css">
  
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: system-ui, sans-serif;
      background-color: #f8fafc;
    }
    .demo-container {
      max-w-6xl: 100%;
      height: 700px;
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      padding: 8px;
      background: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  
  <h1>Viewer Integration Test</h1>
  <p>This page simulates an external CMS or database where the viewer is embedded as a custom web component.</p>
  
  <div class="demo-container">
    <!-- 2. Use the Custom Element -->
    <modern-rti-viewer 
      url="/webrti" 
      share-url="https://example-museum.org/artifact/1"
    ></modern-rti-viewer>
  </div>

  <!-- 3. Include the compiled component script -->
  <!-- Note: This uses the es build. In production, you might serve this from a CDN. -->
  <script type="module" src="./dist/modern-rti-viewer.es.js"></script>
</body>
</html>
